<mat-toolbar class="navbar">

  <div class="logo-container">
    <a routerLink="/home">
      <img src="assets/Logo/logo.png" alt="Logo" class="logo">
    </a>
  </div>

  <span class="spacer"></span>

  <!-- Desktop -->
  <div class="nav-links">
    <ng-container *ngIf="!isLoggedIn">
      <button mat-button routerLink="/home" routerLinkActive="active">Home</button>
      <button mat-button routerLink="/contact" routerLinkActive="active">Contact</button>
      <button mat-button (click)="openLogin()">Login</button>
      <button mat-button (click)="openSignup()">Sign Up</button>
    </ng-container>

    <ng-container *ngIf="isLoggedIn">
      <button mat-button routerLink="/dashboard" routerLinkActive="active">Home</button>
      <button mat-button routerLink="/patients" routerLinkActive="active">Patients</button>
      <button mat-button routerLink="/records" routerLinkActive="active">Records</button>
      <button mat-button (click)="logout()">Logout</button>
    </ng-container>
  </div>

  <!-- Hamburger -->
  <button mat-icon-button class="menu-btn" (click)="toggleMenu()">
    <mat-icon>menu</mat-icon>
  </button>

</mat-toolbar>

<!-- Mobile Menu -->
<div class="mobile-menu" [class.open]="isMenuOpen">

  <ng-container *ngIf="!isLoggedIn">
    <button mat-button routerLink="/home" routerLinkActive="active" (click)="closeMenu()">Home</button>
    <button mat-button routerLink="/contact" routerLinkActive="active" (click)="closeMenu()">Contact</button>
    <button mat-button (click)="openLogin(); closeMenu()">Login</button>
    <button mat-button (click)="openSignup(); closeMenu()">Sign Up</button>
  </ng-container>

  <ng-container *ngIf="isLoggedIn">
    <button mat-button routerLink="/dashboard" routerLinkActive="active" (click)="closeMenu()">Home</button>
    <button mat-button routerLink="/patients" routerLinkActive="active" (click)="closeMenu()">Patients</button>
    <button mat-button routerLink="/records" routerLinkActive="active" (click)="closeMenu()">Records</button>
    <button mat-button (click)="logout(); closeMenu()">Logout</button>
  </ng-container>

</div>
